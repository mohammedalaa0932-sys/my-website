<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام تشغيل الحياة الشخصي | Life OS</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modules.css">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="app-shell">
    
    <!-- Right Sidebar (RTL) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <i data-lucide="sparkles" style="color:white; width:20px; height:20px;"></i>
        </div>
        <div class="sidebar-brand-text">
          <h2>نظام تشغيل الحياة</h2>
          <span>Life Operating System</span>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Built dynamically by app.js -->
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item" onclick="navigateTo('settings')" id="nav-settings-footer">
          <div class="nav-icon"><i data-lucide="settings" style="width:18px;height:18px;"></i></div>
          <span class="nav-label">النظام والإعدادات</span>
        </div>
      </div>
    </aside>

    <!-- Sidebar Toggle (Desktop) -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="تبديل القائمة">
      <i data-lucide="menu" style="width:16px;height:16px;"></i>
    </button>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
      
      <!-- Top Header -->
      <header class="top-header" id="top-header">
        <div style="display:flex; align-items:center; gap:var(--space-3);">
          <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="فتح القائمة">
            <i data-lucide="menu" style="width:20px;height:20px;"></i>
          </button>
          <div class="header-breadcrumb" id="breadcrumb">
            <span class="current-page" id="current-page-label">لوحة التحكم</span>
          </div>
        </div>

        <div class="header-actions">
          <!-- Search Bar -->
          <div class="header-search" id="header-search">
            <i data-lucide="search" style="width:16px;height:16px; color:var(--text-muted);"></i>
            <input type="text" placeholder="بحث شامل (Ctrl+K)..." id="global-search-input">
          </div>

          <!-- Theme Toggle -->
          <button class="header-btn" id="theme-toggle" data-tooltip="تبديل الوضع">
            <i data-lucide="sun" style="width:18px;height:18px;"></i>
          </button>
        </div>
      </header>

      <!-- Rendered Module Container -->
      <div id="module-content" class="page-content">
        <!-- Rendered dynamically -->
      </div>
    </main>
  </div>

  <!-- Floating Action Button (FAB Quick Add) -->
  <button class="fab animate-float" id="fab-btn" aria-label="إضافة سريعة">
    <i data-lucide="plus" style="width:24px;height:24px;"></i>
  </button>

  <!-- Load Modules Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/calendar.js"></script>
  <script src="js/modules/goals.js"></script>
  <script src="js/modules/priorities.js"></script>
  <script src="js/modules/tasks.js"></script>
  <script src="js/modules/habits.js"></script>
  <script src="js/modules/challenge.js"></script>
  <script src="js/modules/motivation.js"></script>
  <script src="js/modules/journal.js"></script>
  <script src="js/modules/discovery.js"></script>
  <script src="js/modules/vision.js"></script>
  <script src="js/modules/gratitude.js"></script>
  <script src="js/modules/reflection.js"></script>
  <script src="js/modules/study.js"></script>
  <script src="js/modules/projects.js"></script>
  <script src="js/modules/health.js"></script>
  <script src="js/modules/finance.js"></script>
  <script src="js/modules/relationships.js"></script>
  <script src="js/modules/bucketlist.js"></script>
  <script src="js/modules/ideas.js"></script>
  <script src="js/modules/statistics.js"></script>
  <script src="js/modules/weekly-review.js"></script>
  <script src="js/modules/search.js"></script>
  <script src="js/modules/settings.js"></script>
  
  <!-- Main Application Entry JS -->
  <script src="js/app.js"></script>
</body>
</html>
